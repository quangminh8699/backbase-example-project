server:
  port: 8080

# API Registry client configuration
eureka:
  instance:
    metadata-map:
      public: true # <-- Backbase-specific: tells Gateway this service is accessible
      role: live # <-- Backbase-specific: routing role
  client:
    serviceUrl:
      defaultZone: http://localhost:8080/registry/eureka/
    enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yaml

# Configure Internal JWT handler
sso:
  jwt:
    internal:
      signature:
        key:
          type: ENV
          value: SIG_SECRET_KEY

# Spring health monitoring
management:
  health:
    jms:
      enabled: false

backbase:
  security:
    public:
      paths:
        - /**
logging:
  level:
    com.backbase.buildingblocks.presentation.errors: DEBUG

    root: info