services:

  registry:
    image: repo.backbase.com/backbase-docker-releases/registry:latest
    ports:
      - "8761:8080"

  example-service:
    image: example-service:1.0.0-SNAPSHOT
    ports:
      - "8080:8080"
    environment:
      - eureka.client.serviceUrl.defaultZone=http://registry:8080/eureka/
      - SIG_SECRET_KEY=JWTSecretKeyDontUseInProduction!
    depends_on:
      - registry
    restart: on-failure
